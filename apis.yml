    description: >-
      REST API for managing LinkedIn advertising campaigns, creatives, reporting,
      lead sync, matched audiences, conversions tracking, media planning, and
      community management. Authentication uses OAuth 2.0 three-legged flow,
      with required API versioning via the LinkedIn-Version header
      (YYYYMM format).
