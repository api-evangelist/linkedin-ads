aid: linkedin-ads
name: LinkedIn Marketing API
description: >-
  The LinkedIn Marketing API Program provides REST APIs that help businesses
  create LinkedIn marketing campaigns, report on campaign performance, manage
  leads from Lead Gen Forms, target matched audiences, and grow company Pages.
  It covers Advertising, Reporting and Analytics, Lead Sync, Matched Audiences,
  Audience Insights, Media Planning, Conversions, Community Management, Event
  Management, and Company Intelligence APIs. Authentication uses OAuth 2.0
  three-legged (authorization code) flow with versioned API access.
type: Index
